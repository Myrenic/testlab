---
- name: Deploy Tailscale
  hosts: all
  become: true
  gather_facts: false
  vars:
    tailscale_repo_url: https://pkgs.tailscale.com/stable/centos/9/tailscale.repo

  tasks:
    - name: Wait for LXC SSH to become available
      wait_for_connection:
        delay: 10
        timeout: 600

    - name: Gather facts
      setup:

    - name: Install Tailscale yum repository
      get_url:
        url: "{{ tailscale_repo_url }}"
        dest: /etc/yum.repos.d/tailscale.repo
        mode: "0644"

    - name: Install Tailscale
      shell: dnf install -y --disablerepo=epel --disablerepo=epel-cisco-openh264 tailscale
      args:
        creates: /usr/bin/tailscale

    - name: Install managed tailscale bootstrap helper
      copy:
        dest: /usr/local/bin/tailscale-up-managed
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          cmd=(
            tailscale
            up
            --reset
            --timeout=90s
            "--hostname={{ tailscale_hostname }}"
            "--ssh={{ 'true' if tailscale_ssh | bool else 'false' }}"
            "--accept-dns={{ 'true' if tailscale_accept_dns | bool else 'false' }}"
            "--accept-routes={{ 'true' if tailscale_accept_routes | bool else 'false' }}"
          )
          {% if tailscale_advertise_exit | bool %}
          cmd+=("--advertise-exit-node=true")
          {% endif %}
          {% if (tailscale_advertise_routes | default('')) | length > 0 %}
          cmd+=("--advertise-routes={{ tailscale_advertise_routes }}")
          {% endif %}
          {% if tailscale_advertise_exit | bool or (tailscale_advertise_routes | default('')) | length > 0 %}
          cmd+=("--accept-risk=all")
          {% endif %}
          {% if (tailscale_advertise_tags | default('')) | length > 0 %}
          cmd+=("--advertise-tags={{ tailscale_advertise_tags }}")
          {% endif %}
          if [[ -n "${TAILSCALE_AUTH_KEY:-}" ]]; then
            cmd+=("--auth-key=${TAILSCALE_AUTH_KEY}")
          fi
          exec "${cmd[@]}" "$@"

    - name: Ensure tailscaled is enabled and started
      systemd:
        name: tailscaled
        state: started
        enabled: true

    - name: Persist forwarding sysctls for exit-node support
      copy:
        dest: /etc/sysctl.d/99-tailscale-exit-node.conf
        mode: "0644"
        content: |
          net.ipv4.ip_forward = {{ 1 if tailscale_advertise_exit | bool else 0 }}
          net.ipv6.conf.all.forwarding = {{ 1 if tailscale_advertise_exit | bool else 0 }}
      register: tailscale_sysctl

    - name: Apply forwarding sysctls
      command: sysctl -p /etc/sysctl.d/99-tailscale-exit-node.conf
      when: tailscale_sysctl.changed

    - name: Read current Tailscale status
      command: tailscale status --json
      register: tailscale_status
      failed_when: false
      changed_when: false

    - name: Record current Tailscale backend state
      set_fact:
        tailscale_backend_state: >-
          {{
            (tailscale_status.stdout | from_json).BackendState
            if tailscale_status.rc == 0 and (tailscale_status.stdout | length) > 0
            else 'NeedsLogin'
          }}
        tailscale_ips: >-
          {{
            (tailscale_status.stdout | from_json).TailscaleIPs | default([])
            if tailscale_status.rc == 0 and (tailscale_status.stdout | length) > 0
            else []
          }}
      changed_when: false

    - name: Bring Tailscale up with auth key when provided
      command: /usr/local/bin/tailscale-up-managed
      environment:
        TAILSCALE_AUTH_KEY: "{{ tailscale_auth_key }}"
      register: tailscale_up
      changed_when: true
      no_log: true
      when:
        - (tailscale_auth_key | default("")) | length > 0
        - tailscale_backend_state != "Running"

    - name: Force logout before auth-key reauthentication
      command: tailscale logout
      register: tailscale_logout
      changed_when: true
      when:
        - (tailscale_auth_key | default("")) | length > 0
        - tailscale_force_reauth | bool
        - tailscale_backend_state == "Running"

    - name: Reauthenticate Tailscale with auth key
      command: /usr/local/bin/tailscale-up-managed
      environment:
        TAILSCALE_AUTH_KEY: "{{ tailscale_auth_key }}"
      register: tailscale_reauth
      changed_when: true
      no_log: true
      when:
        - (tailscale_auth_key | default("")) | length > 0
        - tailscale_force_reauth | bool

    - name: Apply desired Tailscale settings while backend is running
      command: /usr/local/bin/tailscale-up-managed
      environment:
        TAILSCALE_AUTH_KEY: "{{ tailscale_auth_key }}"
      register: tailscale_update_settings
      changed_when: true
      no_log: true
      when:
        - tailscale_backend_state == "Running"
        - not tailscale_force_reauth | bool

    - name: Refresh Tailscale status after auth key bootstrap
      command: tailscale status --json
      register: tailscale_status_after_bootstrap
      changed_when: false
      when:
        - (tailscale_auth_key | default("")) | length > 0
        - tailscale_backend_state != "Running" or tailscale_force_reauth | bool

    - name: Fail when auth key bootstrap does not reach Running
      fail:
        msg: Tailscale failed to reach the Running backend state after bootstrap.
      when:
        - (tailscale_auth_key | default("")) | length > 0
        - tailscale_backend_state != "Running" or tailscale_force_reauth | bool
        - ((tailscale_status_after_bootstrap.stdout | from_json).BackendState | default("")) != "Running"

    - name: Note manual authentication when auth key is absent
      debug:
        msg: Tailscale is installed and tailscaled is running; authenticate it later with /usr/local/bin/tailscale-up-managed.
      when:
        - (tailscale_auth_key | default("")) | length == 0
        - tailscale_backend_state != "Running"

    - name: Show current Tailscale state
      debug:
        msg:
          backend_state: >-
            {{
              ((tailscale_status_after_bootstrap.stdout | from_json).BackendState | default(""))
              if (tailscale_auth_key | default("")) | length > 0 and (tailscale_backend_state != "Running" or tailscale_force_reauth | bool)
              else tailscale_backend_state
            }}
          tailscale_ips: >-
            {{
              ((tailscale_status_after_bootstrap.stdout | from_json).TailscaleIPs | default([]))
              if (tailscale_auth_key | default("")) | length > 0 and (tailscale_backend_state != "Running" or tailscale_force_reauth | bool)
              else tailscale_ips
            }}
