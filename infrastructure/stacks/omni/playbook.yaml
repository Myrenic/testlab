---
- name: Deploy Omni Self-Hosted
  hosts: all
  become: true
  gather_facts: false
  vars:
    omni_dir: /opt/omni
    sqlite_dir: /opt/omni/sqlite
    gnupg_dir: /opt/omni/.gnupg

  tasks:
    - name: Wait for LXC SSH to become available
      wait_for_connection:
        delay: 10
        timeout: 600

    - name: Gather facts
      setup:

    - name: Install prerequisite packages
      dnf:
        name:
          - ca-certificates
          - curl
          - gnupg2
          - openssl
        state: present

    # ── Docker ──────────────────────────────────────────────────────────────
    - name: Install Docker via official install script
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        enabled: true
        state: started

    # ── cfssl ───────────────────────────────────────────────────────────────
    - name: Install cfssl and cfssljson
      shell: |
        CFSSL_VERSION=$(curl -sI https://github.com/cloudflare/cfssl/releases/latest \
          | grep -i location | awk -F '/' '{print $NF}' | tr -d '\r')
        curl -sL -o /usr/local/bin/cfssl \
          "https://github.com/cloudflare/cfssl/releases/download/${CFSSL_VERSION}/cfssl_${CFSSL_VERSION#v}_linux_amd64"
        curl -sL -o /usr/local/bin/cfssljson \
          "https://github.com/cloudflare/cfssl/releases/download/${CFSSL_VERSION}/cfssljson_${CFSSL_VERSION#v}_linux_amd64"
        chmod +x /usr/local/bin/cfssl /usr/local/bin/cfssljson
      args:
        creates: /usr/local/bin/cfssl

    # ── Directories ─────────────────────────────────────────────────────────
    - name: Create Omni working directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
      loop:
        - "{{ omni_dir }}"
        - "{{ sqlite_dir }}"

    - name: Add Omni and Dex hostnames to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ omni_endpoint }} {{ auth_endpoint }}"
        state: present
      when: omni_endpoint | regex_search('^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$') is none

    # ── TLS Certificates ────────────────────────────────────────────────────
    - name: Write CA CSR
      copy:
        dest: "{{ omni_dir }}/ca-csr.json"
        content: |
          {
            "CN": "Omni Internal Root CA",
            "key": { "algo": "rsa", "size": 4096 },
            "ca": { "expiry": "87600h" },
            "names": [{ "C": "US", "O": "Omni Infrastructure", "OU": "Security" }]
          }

    - name: Generate CA certificate
      shell: cfssl gencert -initca ca-csr.json | cfssljson -bare ca
      args:
        chdir: "{{ omni_dir }}"
        creates: "{{ omni_dir }}/ca.pem"

    - name: Trust CA certificate on the host
      copy:
        remote_src: true
        src: "{{ omni_dir }}/ca.pem"
        dest: /etc/pki/ca-trust/source/anchors/omni-ca.pem
        mode: "0644"
      notify: Update CA trust

    - name: Write cfssl signing config
      copy:
        dest: "{{ omni_dir }}/ca-config.json"
        content: |
          {
            "signing": {
              "default": { "expiry": "8760h" },
              "profiles": {
                "web-server": {
                  "usages": ["signing", "key encipherment", "server auth"],
                  "expiry": "8760h"
                }
              }
            }
          }

    - name: Write server certificate CSR
      copy:
        dest: "{{ omni_dir }}/wildcard-csr.json"
        content: |
          {
            "CN": "Omni Internal Wildcard",
            "hosts": [
              "{{ omni_endpoint }}",
              "{{ auth_endpoint }}",
              "127.0.0.1",
              "{{ public_ip }}",
              "{{ ansible_default_ipv4.address }}"
            ],
            "key": { "algo": "rsa", "size": 4096 }
          }

    - name: Remove existing server certificate (forced renewal)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ omni_dir }}/server.pem"
        - "{{ omni_dir }}/server-key.pem"
        - "{{ omni_dir }}/server-chain.pem"
      when: renew_certs | default(false) | bool

    - name: Generate server certificate and full-chain bundle
      shell: |
        cfssl gencert \
          -ca=ca.pem \
          -ca-key=ca-key.pem \
          -config=ca-config.json \
          -profile=web-server \
          wildcard-csr.json | cfssljson -bare server
        cat server.pem ca.pem > server-chain.pem
        chmod 644 server*.pem
      args:
        chdir: "{{ omni_dir }}"
        creates: "{{ omni_dir }}/server-chain.pem"
      notify: Restart Dex and Omni

    # ── Auto-renewal script and systemd timer ────────────────────────────────
    - name: Write cert renewal script
      copy:
        dest: /usr/local/bin/omni-renew-certs
        mode: "0755"
        content: |
          #!/bin/bash
          set -euo pipefail
          OMNI_DIR=/opt/omni
          DAYS_BEFORE_EXPIRY=30

          if openssl x509 -noout -checkend $((DAYS_BEFORE_EXPIRY * 86400)) \
              -in "${OMNI_DIR}/server.pem" 2>/dev/null; then
            echo "omni-renew-certs: certificate valid for more than ${DAYS_BEFORE_EXPIRY} days, nothing to do."
            exit 0
          fi

          echo "omni-renew-certs: certificate expires within ${DAYS_BEFORE_EXPIRY} days — renewing."
          cd "${OMNI_DIR}"
          rm -f server.pem server-key.pem server-chain.pem
          cfssl gencert \
            -ca=ca.pem \
            -ca-key=ca-key.pem \
            -config=ca-config.json \
            -profile=web-server \
            wildcard-csr.json | cfssljson -bare server
          cat server.pem ca.pem > server-chain.pem
          chmod 644 server*.pem

          echo "omni-renew-certs: restarting stack via docker compose."
          docker compose restart dex
          for i in $(seq 1 30); do
            docker compose exec dex curl -sk \
              https://127.0.0.1:5556/.well-known/openid-configuration | grep -q issuer && break
            sleep 5
          done
          docker compose restart omni
          echo "omni-renew-certs: done."

    - name: Install omni-renew-certs systemd service
      copy:
        dest: /etc/systemd/system/omni-renew-certs.service
        content: |
          [Unit]
          Description=Renew Omni TLS certificate if expiring soon
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/omni-renew-certs
          StandardOutput=journal
          StandardError=journal

    - name: Install omni-renew-certs systemd timer (weekly)
      copy:
        dest: /etc/systemd/system/omni-renew-certs.timer
        content: |
          [Unit]
          Description=Weekly check: renew Omni TLS cert if expiring within 30 days

          [Timer]
          OnCalendar=weekly
          Persistent=true

          [Install]
          WantedBy=timers.target
      notify: Reload systemd and enable cert timer

    # ── etcd Encryption Key ─────────────────────────────────────────────────
    - name: Generate GPG key for Omni etcd encryption
      shell: |
        mkdir -p "{{ gnupg_dir }}"
        chmod 700 "{{ gnupg_dir }}"
        gpg --batch --passphrase '' \
          --quick-generate-key \
          "Omni (Used for etcd data encryption) omni@internal.local" \
          rsa4096 cert never
        FINGERPRINT=$(gpg --with-colons --list-keys "omni@internal.local" \
          | awk -F: '$1 == "fpr" {print $10; exit}')
        gpg --batch --passphrase '' \
          --quick-add-key "${FINGERPRINT}" rsa4096 encr never
        gpg --export-secret-key --armor omni@internal.local > "{{ omni_dir }}/omni.asc"
      args:
        creates: "{{ omni_dir }}/omni.asc"
      environment:
        GNUPGHOME: "{{ gnupg_dir }}"

    # ── Dex OIDC Identity Provider ──────────────────────────────────────────
    - name: Generate Dex admin password hash (bcrypt via htpasswd)
      shell: |
        HASH_FILE="{{ omni_dir }}/.dex-hash"
        PW_SHA=$(echo -n "{{ admin_password }}" | sha256sum | cut -d' ' -f1)
        if [ -f "$HASH_FILE" ]; then
          STORED_SHA=$(cut -d: -f1 "$HASH_FILE")
          if [ "$STORED_SHA" = "$PW_SHA" ]; then
            cut -d: -f2 "$HASH_FILE"
            exit 0
          fi
        fi
        HASH=$(docker run --rm httpd:2.4-alpine \
          htpasswd -bnBC 10 admin "{{ admin_password }}" | cut -d: -f2 | tr -d '\r\n')
        echo "${PW_SHA}:${HASH}" > "$HASH_FILE"
        chmod 600 "$HASH_FILE"
        echo "$HASH"
      register: dex_password_hash
      changed_when: false
      no_log: true

    - name: Write Dex configuration
      copy:
        dest: "{{ omni_dir }}/dex.yaml"
        mode: "0644"
        content: |
          issuer: https://{{ auth_endpoint }}:5556

          storage:
            type: memory

          web:
            https: 0.0.0.0:5556
            tlsCert: /etc/dex/tls/server-chain.pem
            tlsKey: /etc/dex/tls/server-key.pem

          enablePasswordDB: true

          staticClients:
            - name: Omni
              id: omni
              secret: omni-dex-secret
              redirectURIs:
                - https://{{ omni_endpoint }}/oidc/consume

          staticPasswords:
            - email: "{{ admin_email }}"
              username: "admin"
              preferredUsername: "admin"
              hash: "{{ dex_password_hash.stdout | trim }}"
      no_log: true

    # ── Omni + Dex Stack (Docker Compose) ───────────────────────────────────
    - name: Fetch latest Omni release tag
      shell: |
        curl -sI https://github.com/siderolabs/omni/releases/latest \
          | grep -i location | awk -F '/' '{print $NF}' | tr -d '\r'
      register: omni_latest_tag
      changed_when: false
      when: omni_version | default('') == ''

    - name: Set effective Omni version
      set_fact:
        effective_omni_version: >-
          {{ omni_version if omni_version | default('') != ''
             else omni_latest_tag.stdout | default('') | trim }}

    - name: Write docker-compose.yml
      copy:
        dest: "{{ omni_dir }}/docker-compose.yml"
        mode: "0644"
        content: |
          services:
            dex:
              image: ghcr.io/dexidp/dex:v2.41.1
              restart: unless-stopped
              command: dex serve /etc/dex/dex.yaml
              ports:
                - "5556:5556"
              volumes:
                - ./dex.yaml:/etc/dex/dex.yaml:ro
                - ./server-key.pem:/etc/dex/tls/server-key.pem:ro
                - ./server-chain.pem:/etc/dex/tls/server-chain.pem:ro
              healthcheck:
                test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:5556/.well-known/openid-configuration 2>/dev/null | grep -q issuer"]
                interval: 10s
                timeout: 5s
                retries: 30
                start_period: 10s

            omni:
              image: ghcr.io/siderolabs/omni:{{ effective_omni_version }}
              restart: unless-stopped
              network_mode: host
              cap_add:
                - NET_ADMIN
              devices:
                - /dev/net/tun:/dev/net/tun
              volumes:
                - ./ca.pem:/etc/ssl/certs/ca-certificates.crt:ro
                - ./server-key.pem:/server-key.pem:ro
                - ./server-chain.pem:/server-chain.pem:ro
                - ./omni.asc:/omni.asc:ro
                - ./sqlite:/_out/sqlite:rw
              command:
                - --name=omni
                - --cert=/server-chain.pem
                - --key=/server-key.pem
                - --machine-api-cert=/server-chain.pem
                - --machine-api-key=/server-key.pem
                - --machine-api-bind-addr=0.0.0.0:8090
                - --private-key-source=file:///omni.asc
                - --event-sink-port=8091
                - --bind-addr=0.0.0.0:443
                - --k8s-proxy-bind-addr=0.0.0.0:8100
                - --advertised-api-url=https://{{ omni_endpoint }}/
                - --siderolink-api-advertised-url=https://{{ omni_endpoint }}:8090/
                - --siderolink-wireguard-advertised-addr={{ public_ip }}:50180
                - --advertised-kubernetes-proxy-url=https://{{ omni_endpoint }}:8100/
                - --auth-auth0-enabled=false
                - --auth-oidc-enabled=true
                - --auth-oidc-provider-url=https://{{ auth_endpoint }}:5556
                - --auth-oidc-client-id=omni
                - --auth-oidc-client-secret=omni-dex-secret
                - --auth-oidc-scopes=openid
                - --auth-oidc-scopes=profile
                - --auth-oidc-scopes=email
                - --sqlite-storage-path=/_out/sqlite/omni.db
                - --initial-users={{ admin_email }}
              depends_on:
                dex:
                  condition: service_healthy
      notify: Bring up compose stack

    - name: Remove legacy standalone containers (pre-compose)
      shell: |
        for c in dex omni; do
          LABELS=$(docker inspect "$c" --format '{{ "{{" }}json .Config.Labels{{ "}}" }}' 2>/dev/null || echo '{}')
          if echo "$LABELS" | grep -qv 'com.docker.compose'; then
            docker rm -f "$c" 2>/dev/null || true
          fi
        done
      changed_when: false

    - name: Ensure compose stack is running
      shell: docker compose -f {{ omni_dir }}/docker-compose.yml up -d --wait --pull missing
      args:
        chdir: "{{ omni_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

    - name: Install omni-stack systemd service
      copy:
        dest: /etc/systemd/system/omni-stack.service
        content: |
          [Unit]
          Description=Omni self-hosted stack (Dex → Omni via Docker Compose)
          After=docker.service network-online.target
          Requires=docker.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ omni_dir }}
          ExecStart=/usr/bin/docker compose up -d --wait
          ExecStop=/usr/bin/docker compose down

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd and enable omni-stack

    - name: Verify containers are running
      shell: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Show running containers
      debug:
        msg: "{{ docker_ps.stdout_lines }}"

  handlers:
    - name: Update CA trust
      command: update-ca-trust

    - name: Bring up compose stack
      shell: docker compose -f {{ omni_dir }}/docker-compose.yml up -d --wait --pull missing
      args:
        chdir: "{{ omni_dir }}"

    - name: Restart Dex and Omni
      shell: |
        cd {{ omni_dir }}
        docker compose restart dex
        docker compose exec dex curl -sk \
          https://127.0.0.1:5556/.well-known/openid-configuration | grep -q issuer || sleep 30
        docker compose restart omni

    - name: Reload systemd and enable cert timer
      shell: |
        systemctl daemon-reload
        systemctl enable --now omni-renew-certs.timer

    - name: Reload systemd and enable omni-stack
      shell: |
        systemctl daemon-reload
        systemctl enable --now omni-stack.service
