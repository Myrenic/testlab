---
- name: Deploy GitHub Actions Self-Hosted Runner
  hosts: all
  become: true
  gather_facts: false
  vars:
    runner_dir: /opt/actions-runner
    runner_user: runner
    runner_version: "2.321.0"

  tasks:
    - name: Wait for LXC SSH to become available
      wait_for_connection:
        delay: 10
        timeout: 600

    - name: Gather facts
      setup:

    - name: Install required packages
      dnf:
        name:
          - curl
          - jq
          - git
          - tar
          - unzip
          - which
          - ansible-core
          - python3-pip
        state: present

    - name: Install Ansible Proxmox provider dependencies
      pip:
        name:
          - ansible
        state: present

    - name: Install SOPS
      shell: |
        SOPS_VERSION=$(curl -sI https://github.com/getsops/sops/releases/latest | grep -i location | awk -F/ '{print $NF}' | tr -d '\r')
        curl -sL -o /usr/local/bin/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
        chmod +x /usr/local/bin/sops
      args:
        creates: /usr/local/bin/sops

    - name: Install age
      shell: |
        AGE_VERSION=$(curl -sI https://github.com/FiloSottile/age/releases/latest | grep -i location | awk -F/ '{print $NF}' | tr -d '\r')
        curl -sL "https://github.com/FiloSottile/age/releases/download/${AGE_VERSION}/age-${AGE_VERSION}-linux-amd64.tar.gz" | tar xz -C /tmp
        mv /tmp/age/age /usr/local/bin/age
        mv /tmp/age/age-keygen /usr/local/bin/age-keygen
        rm -rf /tmp/age
      args:
        creates: /usr/local/bin/age

    # ── OpenTofu ───────────────────────────────────────────────────────────
    - name: Install OpenTofu
      shell: |
        curl -fsSL https://get.opentofu.org/install-opentofu.sh | bash -s -- --install-method rpm
      args:
        creates: /usr/bin/tofu

    # ── Runner user ────────────────────────────────────────────────────────
    - name: Create runner user
      user:
        name: "{{ runner_user }}"
        system: true
        home: "{{ runner_dir }}"
        shell: /bin/bash
        create_home: true

    - name: Generate SSH keypair for runner user
      become: true
      become_user: "{{ runner_user }}"
      shell: |
        mkdir -p {{ runner_dir }}/.ssh
        chmod 700 {{ runner_dir }}/.ssh
        ssh-keygen -t ed25519 -C "github-runner@tofu" -f {{ runner_dir }}/.ssh/id_ed25519 -N ""
      args:
        creates: "{{ runner_dir }}/.ssh/id_ed25519"

    - name: Install sshpass for Proxmox SSH bootstrap
      dnf:
        name: sshpass
        state: present

    # ── Download and install runner ────────────────────────────────────────
    - name: Download GitHub Actions runner
      get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: "/tmp/actions-runner.tar.gz"
        mode: "0644"

    - name: Extract runner
      unarchive:
        src: /tmp/actions-runner.tar.gz
        dest: "{{ runner_dir }}"
        remote_src: true
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Install runner dependencies
      shell: "{{ runner_dir }}/bin/installdependencies.sh"
      args:
        creates: /usr/lib64/libicu*.so*

    # ── Register runner ────────────────────────────────────────────────────
    - name: Get runner registration token
      uri:
        url: "https://api.github.com/repos/{{ github_repo }}/actions/runners/registration-token"
        method: POST
        headers:
          Authorization: "token {{ github_pat }}"
          Accept: "application/vnd.github.v3+json"
        status_code: 201
        return_content: true
      register: reg_token

    - name: Configure runner
      become: true
      become_user: "{{ runner_user }}"
      shell: |
        {{ runner_dir }}/config.sh \
          --url "https://github.com/{{ github_repo }}" \
          --token "{{ reg_token.json.token }}" \
          --name "tofu-runner" \
          --labels "{{ runner_labels }}" \
          --work "_work" \
          --unattended \
          --replace
      args:
        chdir: "{{ runner_dir }}"
        creates: "{{ runner_dir }}/.runner"

    # ── Install as systemd service ─────────────────────────────────────────
    - name: Install runner service
      shell: "cd {{ runner_dir }} && ./svc.sh install {{ runner_user }}"
      args:
        creates: /etc/systemd/system/actions.runner.*.service

    - name: Start runner service
      shell: "cd {{ runner_dir }} && ./svc.sh start"
      register: svc_start
      changed_when: "'started' in svc_start.stdout or 'Starting' in svc_start.stdout"

    # ── Runner environment for tofu workflows ──────────────────────────────
    - name: Set runner environment variables
      copy:
        content: |
          # SOPS_AGE_KEY is injected via GitHub Actions secrets at runtime
        dest: "{{ runner_dir }}/.env"
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        mode: "0600"

    - name: Clean up
      file:
        path: /tmp/actions-runner.tar.gz
        state: absent
