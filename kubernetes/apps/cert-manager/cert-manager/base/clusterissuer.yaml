apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: domain-0-prod
spec:
  acme:
    email: "unknown@github.com"
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: domain-0-prod
    solvers:
      - dns01:
          cloudflare:
            email: "unknown@github.com"
            apiKeySecretRef:
              name: cloudflare-issuer-secret
              key: CLOUDFLARE_CERT_MANAGER_TOKEN
        selector:
          dnsZones:
            - "${SECRET_DOMAIN_0}"

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: domain-1-prod
spec:
  acme:
    email: "unknown@github.com"
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: domain-1-prod
    solvers:
      - dns01:
          cloudflare:
            email: "unknown@github.com"
            apiKeySecretRef:
              name: cloudflare-issuer-secret
              key: CLOUDFLARE_CERT_MANAGER_TOKEN
        selector:
          dnsZones:
            - "${SECRET_DOMAIN_1}"

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: &name cluster-selfsigned-ca
spec:
  isCA: true
  commonName: *name
  subject:
    organizations:
      - tuntelder
  secretName: *name
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: cluster-selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-selfsigned
spec:
  ca:
    secretName: cluster-selfsigned-ca