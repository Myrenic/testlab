apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: esphome-dist-client
  namespace: flux-system
spec:
  targetNamespace: services
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  prune: true
  path: ./kubernetes/apps/services/esphome-dist-client/base
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
