apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stremthru
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: stremthru
  values:
    controllers:
      stremthru:
        containers:
          app:
            image:
              repository: ghcr.io/muniftanjim/stremthru
              tag: 0.102.1
            envFrom:
              - secretRef:
                  name: stremthru-secret
            env:
              TZ: "${TZ}"
              STREMTHRU_BASE_URL: "https://stremthru.${SECRET_DOMAIN_0}"
              STREMTHRU_PORT: "8080"
              STREMTHRU_LOG_LEVEL: "INFO"
              STREMTHRU_LOG_FORMAT: "text"
              STREMTHRU_DATA_DIR: "/app/data"
              STREMTHRU_DATABASE_URI: "sqlite:///app/data/stremthru.db"
              STREMTHRU_STORE_CONTENT_PROXY: "realdebrid:true,torbox:true,*:false"
              STREMTHRU_STORE_TUNNEL: "realdebrid:true,torbox:true,*:false"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 8080
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteMany
        size: 10Gi
        globalMounts:
          - path: /app/data
