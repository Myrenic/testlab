apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: nousresearch/hermes-agent@sha256:df3aaef155493d48cfdc318aeae24f2fad7d2506b369aea0adf1cbb082660e50
          args:
            - gateway
            - run
          env:
            - name: HERMES_HOME
              value: /opt/data
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /opt/data
        - name: dashboard
          image: nousresearch/hermes-agent@sha256:df3aaef155493d48cfdc318aeae24f2fad7d2506b369aea0adf1cbb082660e50
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --insecure
            - --no-open
          env:
            - name: HERMES_HOME
              value: /opt/data
          ports:
            - name: http
              containerPort: 9119
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
