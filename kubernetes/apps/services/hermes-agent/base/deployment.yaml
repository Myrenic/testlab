apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
      annotations:
        checksum/config: e5dc0e4e5c8f1548
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-seed
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/data/.hermes
              cp /hermes-seed/config.yaml /opt/data/.hermes/config.yaml
              echo "Applied /opt/data/.hermes/config.yaml from ConfigMap"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: hermes-config
              mountPath: /hermes-seed
      containers:
        - name: gateway
          image: nousresearch/hermes-agent@sha256:bb9bda941bcac4a5323b0393e66d4f61020ea8977230e06366c19e5aca97814f
          args:
            - gateway
            - run
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_INFERENCE_PROVIDER
              value: copilot
          envFrom:
            - secretRef:
                name: hermes-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - CHOWN
                - FOWNER
                - SETGID
                - SETUID
              drop:
                - ALL
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /opt/data
        - name: dashboard
          image: nousresearch/hermes-agent@sha256:bb9bda941bcac4a5323b0393e66d4f61020ea8977230e06366c19e5aca97814f
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --insecure
            - --no-open
          env:
            - name: HERMES_HOME
              value: /opt/data
          ports:
            - name: http
              containerPort: 9119
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - CHOWN
                - FOWNER
                - SETGID
                - SETUID
              drop:
                - ALL
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: hermes-config
          configMap:
            name: hermes-agent-config
