apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: zigbee2mqtt
  values:
    controllers:
      zigbee2mqtt:
        strategy: Recreate
        containers:
          app:
            image:
              repository: koenkk/zigbee2mqtt
              tag: "2.9.2"
            env:
              TZ: "${TZ}"
              # MQTT broker (in-cluster)
              ZIGBEE2MQTT_CONFIG_MQTT_SERVER: "mqtt://mqtt.services.svc.cluster.local"
              # Zigbee adapter — update PLACEHOLDER_SMLIGHT_IP to your SMLIGHT MR5U IP address
              ZIGBEE2MQTT_CONFIG_SERIAL_PORT: "tcp://PLACEHOLDER_SMLIGHT_IP:6638"
              ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: "ember"
              # Web frontend
              ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
              # Home Assistant MQTT discovery (nested object in Z2M 2.x)
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
            resources: {}
        pod:
          securityContext:
            runAsNonRoot: false
            seccompProfile:
              type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 8080
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn-2-replicas
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data
