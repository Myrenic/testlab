apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-ingress-health
  namespace: flux-system
spec:
  targetNamespace: monitoring
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: monitoring-kube-prometheus-stack
      namespace: flux-system
  path: ./kubernetes/apps/monitoring/ingress-health/base
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: prometheus-blackbox-exporter
      namespace: monitoring
