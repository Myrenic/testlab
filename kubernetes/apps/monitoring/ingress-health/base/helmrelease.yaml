---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-blackbox-exporter
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 11.10.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    config:
      modules:
        https_2xx:
          prober: http
          timeout: 10s
          http:
            method: GET
            preferred_ip_protocol: ip4
            fail_if_not_ssl: true
