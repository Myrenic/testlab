apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docker-daemon
  namespace: flux-system
spec:
  targetNamespace: dev-platform
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  prune: true
  path: ./kubernetes/apps/dev-platform/docker/base
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
