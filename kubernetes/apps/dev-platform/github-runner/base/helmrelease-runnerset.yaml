apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infra-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: gha-runner-scale-set-controller
  values:
    githubConfigUrl: https://github.com/myrenic/testlab
    githubConfigSecret: arc-github-auth
    runnerScaleSetName: infra-runner
    minRunners: 1
    maxRunners: 2
    scaleSetLabels:
      - infra-runner
    template:
      spec:
        securityContext:
          fsGroup: 1001
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command:
              - /home/runner/run.sh
            env:
              - name: SOPS_AGE_KEY_FILE
                value: /etc/sops-age/age.agekey
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 2Gi
            volumeMounts:
              - name: sops-age
                mountPath: /etc/sops-age
                readOnly: true
              - name: tofu-state
                mountPath: /runner-state
        volumes:
          - name: sops-age
            secret:
              secretName: sops-age
              items:
                - key: age.agekey
                  path: age.agekey
          - name: tofu-state
            persistentVolumeClaim:
              claimName: infra-runner-tofu-state
