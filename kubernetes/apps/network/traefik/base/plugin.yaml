---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-plugin-fail2ban
  namespace: network
data:
  fail2ban.go: |
    package fail2ban

    import (
    	"context"
    	"fmt"
    	"net"
    	"net/http"
    	"os"
    	"strings"
    	"sync"
    	"time"
    )

    // Config holds the plugin configuration passed in from Traefik.
    type Config struct {
    	NumberFails  uint
    	BanTime      string
    	ClientHeader string
    	LogLevel     string
    	// Whitelist is a list of CIDR ranges that are never banned (e.g. "10.0.0.0/8").
    	Whitelist []string
    }

    // CreateConfig returns a Config with safe defaults.
    func CreateConfig() *Config {
    	return &Config{
    		NumberFails:  3,
    		BanTime:      "3h",
    		ClientHeader: "Cf-Connecting-IP",
    		LogLevel:     "INFO",
    		Whitelist:    []string{},
    	}
    }

    const (
    	lvlDebug = 0
    	lvlInfo  = 1
    	lvlWarn  = 2
    	lvlError = 3
    )

    func parseLogLevel(s string) int {
    	switch strings.ToUpper(s) {
    	case "DEBUG":
    		return lvlDebug
    	case "WARN":
    		return lvlWarn
    	case "ERROR":
    		return lvlError
    	default:
    		return lvlInfo
    	}
    }

    func levelName(l int) string {
    	switch l {
    	case lvlDebug:
    		return "DEBUG"
    	case lvlWarn:
    		return "WARN"
    	case lvlError:
    		return "ERROR"
    	default:
    		return "INFO"
    	}
    }

    type fail2Ban struct {
    	next          http.Handler
    	name          string
    	maxFails      uint
    	banTime       time.Duration
    	clientHeader  string
    	bannedClients map[string]*banEntry
    	whitelist     []*net.IPNet
    	mu            sync.Mutex
    	logLevel      int
    }

    type banEntry struct {
    	lastViewed  time.Time
    	failCounter uint
    }

    func (b *banEntry) hasBanExpired(now time.Time, d time.Duration) bool {
    	return now.After(b.lastViewed.Add(d))
    }

    // New creates a new fail2Ban middleware instance.
    func New(ctx context.Context, next http.Handler, config *Config, name string) (http.Handler, error) {
    	duration, err := time.ParseDuration(config.BanTime)
    	if err != nil {
    		return nil, fmt.Errorf("invalid BanTime %q: %v", config.BanTime, err)
    	}

    	whitelist := make([]*net.IPNet, 0, len(config.Whitelist))
    	for _, cidr := range config.Whitelist {
    		_, network, parseErr := net.ParseCIDR(cidr)
    		if parseErr != nil {
    			return nil, fmt.Errorf("invalid Whitelist CIDR %q: %v", cidr, parseErr)
    		}
    		whitelist = append(whitelist, network)
    	}

    	f := &fail2Ban{
    		name:          name,
    		next:          next,
    		maxFails:      config.NumberFails,
    		clientHeader:  config.ClientHeader,
    		banTime:       duration,
    		bannedClients: make(map[string]*banEntry),
    		whitelist:     whitelist,
    		logLevel:      parseLogLevel(config.LogLevel),
    	}

    	f.logf(lvlInfo, "started — maxFails=%d banTime=%s clientHeader=%q whitelist=%v",
    		f.maxFails, f.banTime, f.clientHeader, config.Whitelist)

    	go f.cleaner(ctx)
    	return f, nil
    }

    func (f *fail2Ban) logf(level int, format string, args ...interface{}) {
    	if level < f.logLevel {
    		return
    	}
    	msg := fmt.Sprintf(format, args...)
    	fmt.Fprintf(os.Stdout,
    		"{\"prefix\":\"Fail-2-Ban\",\"level\":%q,\"msg\":%q,\"time\":%q}\n",
    		levelName(level), msg, time.Now().UTC().Format("2006-01-02T15:04:05Z"),
    	)
    }

    // logBanEvent emits a structured ban event with dedicated fields so Loki can
    // filter by event="ban" and extract banned_ip for geo-enrichment.
    func (f *fail2Ban) logBanEvent(ip string, failures uint) {
    	fmt.Fprintf(os.Stdout,
    		"{\"prefix\":\"Fail-2-Ban\",\"level\":\"INFO\",\"event\":\"ban\",\"banned_ip\":%q,\"failures\":%d,\"msg\":\"banned %s after %d failures\",\"time\":%q}\n",
    		ip, failures, ip, failures, time.Now().UTC().Format("2006-01-02T15:04:05Z"))
    }

    // logUnbanEvent emits a structured unban event.
    func (f *fail2Ban) logUnbanEvent(ip string) {
    	fmt.Fprintf(os.Stdout,
    		"{\"prefix\":\"Fail-2-Ban\",\"level\":\"INFO\",\"event\":\"unban\",\"banned_ip\":%q,\"msg\":\"un-banned %s (ban expired)\",\"time\":%q}\n",
    		ip, ip, time.Now().UTC().Format("2006-01-02T15:04:05Z"))
    }

    // logExtendBanEvent emits a structured extend event. Including banned_ip allows
    // Promtail's GeoIP pipeline to enrich it so the Geomap shows active bans in
    // real time, not just at the moment of the initial ban.
    func (f *fail2Ban) logExtendBanEvent(ip string, hits uint) {
    	fmt.Fprintf(os.Stdout,
    		"{\"prefix\":\"Fail-2-Ban\",\"level\":\"INFO\",\"event\":\"ban_extend\",\"banned_ip\":%q,\"hits\":%d,\"msg\":\"extending ban for %s (total hits: %d)\",\"time\":%q}\n",
    		ip, hits, ip, hits, time.Now().UTC().Format("2006-01-02T15:04:05Z"))
    }

    // ServeHTTP is the middleware entry point.
    func (f *fail2Ban) ServeHTTP(rw http.ResponseWriter, req *http.Request) {
    	clientIP, err := f.extractClient(req)
    	if err != nil {
    		f.logf(lvlError, "could not determine client IP: %v — blocking request", err)
    		rw.WriteHeader(http.StatusForbidden)
    		return
    	}

    	f.logf(lvlDebug, "request from %s", clientIP)

    	// Never count or ban whitelisted IPs.
    	if f.isWhitelisted(clientIP) {
    		f.next.ServeHTTP(rw, req)
    		return
    	}

    	if f.isClientBanned(clientIP) {
    		rw.WriteHeader(http.StatusForbidden)
    		return
    	}

    	i := newIntercept(rw)
    	f.next.ServeHTTP(i, req)

    	if i.checkBadUserRequestStatusCode() {
    		f.incrementViewCounter(clientIP)
    	}
    }

    func (f *fail2Ban) isWhitelisted(ipStr string) bool {
    	ip := net.ParseIP(ipStr)
    	if ip == nil {
    		return false
    	}
    	for _, network := range f.whitelist {
    		if network.Contains(ip) {
    			f.logf(lvlDebug, "%s whitelisted via %s — pass through", ipStr, network.String())
    			return true
    		}
    	}
    	return false
    }

    func (f *fail2Ban) isClientBanned(ip string) bool {
    	f.mu.Lock()
    	defer f.mu.Unlock()
    	c, ok := f.bannedClients[ip]
    	if !ok {
    		return false
    	}
    	if c.failCounter >= f.maxFails {
    		if c.hasBanExpired(time.Now(), f.banTime) {
    			f.logUnbanEvent(ip)
    			delete(f.bannedClients, ip)
    			return false
    		}
    		f.logExtendBanEvent(ip, c.failCounter+1)
    		c.failCounter++
    		c.lastViewed = time.Now()
    		return true
    	}
    	return false
    }

    func (f *fail2Ban) incrementViewCounter(ip string) {
    	f.mu.Lock()
    	defer f.mu.Unlock()
    	e := f.bannedClients[ip]
    	if e == nil {
    		f.bannedClients[ip] = &banEntry{failCounter: 1, lastViewed: time.Now()}
    		return
    	}
    	e.failCounter++
    	e.lastViewed = time.Now()
    	if e.failCounter >= f.maxFails {
    		f.logBanEvent(ip, e.failCounter)
    	}
    }

    // cleaner periodically evicts entries whose ban has expired.
    func (f *fail2Ban) cleaner(ctx context.Context) {
    	interval := f.banTime / 4
    	if interval < time.Minute {
    		interval = time.Minute
    	}
    	timer := time.NewTimer(interval)
    	defer timer.Stop()
    	for {
    		select {
    		case <-ctx.Done():
    			return
    		case <-timer.C:
    			f.mu.Lock()
    			now := time.Now()
    			for ip, c := range f.bannedClients {
    				if c.hasBanExpired(now, f.banTime) {
    					delete(f.bannedClients, ip)
    				}
    			}
    			f.mu.Unlock()
    		}
    		timer.Reset(interval)
    	}
    }

    func (f *fail2Ban) extractClient(req *http.Request) (string, error) {
    	if len(f.clientHeader) > 0 {
    		v := req.Header.Get(f.clientHeader)
    		if v == "" {
    			return "", fmt.Errorf("header %q is absent", f.clientHeader)
    		}
    		return v, nil
    	}
    	ip, _, err := net.SplitHostPort(req.RemoteAddr)
    	if err != nil {
    		return "", fmt.Errorf("cannot parse RemoteAddr %q: %v", req.RemoteAddr, err)
    	}
    	return ip, nil
    }

    // interceptor captures the downstream status code without buffering the body.
    type interceptor struct {
    	http.ResponseWriter
    	code int
    }

    func newIntercept(w http.ResponseWriter) *interceptor {
    	return &interceptor{w, http.StatusOK}
    }

    func (i *interceptor) WriteHeader(code int) {
    	i.code = code
    	i.ResponseWriter.WriteHeader(code)
    }

    func (i *interceptor) checkBadUserRequestStatusCode() bool {
    	return i.code >= http.StatusBadRequest && i.code < http.StatusInternalServerError
    }

  go.mod: |
    module github.com/myrenic/fail2ban

    go 1.21

  .traefik.yml: |
    displayName: Fail 2 Ban (myrenic)
    type: middleware
    import: github.com/myrenic/fail2ban
    summary: Ban IPs that make too many bad HTTP requests, with CIDR whitelist support.
    testData:
      NumberFails: 3
      BanTime: 1h
      ClientHeader: ""
      Whitelist:
        - "10.0.0.0/8"
