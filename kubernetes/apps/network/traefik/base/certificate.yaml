apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: domain-0
spec:
  secretName: domain-0-prod-tls
  issuerRef:
    name: domain-0-prod
    kind: ClusterIssuer
  dnsNames:
    - "${SECRET_DOMAIN_0}"
    - "*.${SECRET_DOMAIN_0}"

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: domain-1
spec:
  secretName: domain-1-prod-tls
  issuerRef:
    name: cluster-selfsigned
    kind: ClusterIssuer
  dnsNames:
    - "${SECRET_DOMAIN_1}"
    - "*.${SECRET_DOMAIN_1}"
