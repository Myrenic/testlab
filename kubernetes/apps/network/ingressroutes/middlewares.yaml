apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: network
spec:
  defaultCertificate:
    secretName: domain-0-prod-tls

---
# ForwardAuth middleware for Authentik — applied to flux + longhorn routes
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: network
spec:
  forwardAuth:
    address: "https://auth.${SECRET_DOMAIN_0}/outpost.goauthentik.io/auth/traefik"
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
