apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: network
spec:
  defaultCertificate:
    secretName: domain-0-prod-tls

---
# ForwardAuth middleware for OAuth2 Proxy — applied to flux + longhorn routes
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-forwardauth
  namespace: network
spec:
  forwardAuth:
    address: "http://oauth2-proxy.auth.svc.cluster.local:80/oauth2/auth"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Access-Token
