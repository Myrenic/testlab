apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: network
spec:
  defaultCertificate:
    secretName: domain-0-prod-tls

---
# ForwardAuth middleware — checks authentication with oauth2-proxy
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-forwardauth
  namespace: network
spec:
  forwardAuth:
    address: "http://oauth2-proxy.auth.svc.cluster.local:80/oauth2/auth"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Access-Token

---
# Catches 401 from forwardAuth and redirects to Azure sign-in
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-errors
  namespace: network
spec:
  errors:
    status:
      - "401"
    service:
      name: oauth2-proxy
      namespace: auth
      port: 80
    query: "/oauth2/start?rd={url}"

---
# Chain: errors wraps forwardAuth so 401 triggers auto-redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-auth
  namespace: network
spec:
  chain:
    middlewares:
      - name: oauth2-proxy-errors
      - name: oauth2-proxy-forwardauth
