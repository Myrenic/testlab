apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: velero-ui
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`backups.${SECRET_DOMAIN_0}`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy-auth
          namespace: network
      services:
        - name: velero-ui
          namespace: velero
          port: 3000
  tls:
    secretName: domain-0-prod-tls
