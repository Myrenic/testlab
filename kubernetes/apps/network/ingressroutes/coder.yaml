apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: coder
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`coder.${SECRET_DOMAIN_0}`)
      kind: Rule
      services:
        - name: coder
          namespace: dev-platform
          port: 80
  tls:
    secretName: domain-0-prod-tls
