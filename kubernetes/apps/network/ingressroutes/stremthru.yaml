apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stremthru
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`stremthru.${SECRET_DOMAIN_0}`)
      kind: Rule
      services:
        - name: stremthru
          namespace: services
          port: 8080
  tls:
    secretName: domain-0-prod-tls
