apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zigbee2mqtt
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zigbee2mqtt.${SECRET_DOMAIN_0}`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy-auth
          namespace: network
      services:
        - name: zigbee2mqtt
          namespace: services
          port: 8080
  tls:
    secretName: domain-0-prod-tls
