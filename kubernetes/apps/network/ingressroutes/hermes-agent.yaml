apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-agent
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes.${SECRET_DOMAIN_0}`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy-auth
          namespace: network
      services:
        - name: hermes-agent
          namespace: services
          port: 9119
  tls:
    secretName: domain-0-prod-tls
