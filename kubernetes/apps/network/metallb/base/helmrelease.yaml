---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: network
spec:
  interval: 1h
  chart:
    spec:
      chart: metallb
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: network
  values:
    speaker:
      ignoreExcludeLB: true
