apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        # CoreDNS forward requires literal IPs (not DNS names), otherwise CoreDNS exits on startup.
        # Keep the first IP aligned with pihole-dns-cluster.spec.clusterIP in pihole/base/services.yaml.
        # Public resolvers are fallback to keep cluster DNS working while Pi-hole/Longhorn are recovering.
        forward . 10.107.156.12 1.1.1.1 9.9.9.9 {
          policy sequential
          max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
        import /etc/coredns/custom/*.override
    }
    import /etc/coredns/custom/*.server
