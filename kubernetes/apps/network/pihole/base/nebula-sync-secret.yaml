apiVersion: v1
kind: Secret
metadata:
  name: nebula-sync-secret
  namespace: network
stringData:
  # control10 is the designated primary — edit settings there via the web UI.
  # nebula-sync exports from it and pushes to control11 and control12.
  PRIMARY: "http://10.0.69.10:30080|${PIHOLE_WEBPASSWORD}"
  REPLICAS: "http://10.0.69.11:30080|${PIHOLE_WEBPASSWORD},http://10.0.69.12:30080|${PIHOLE_WEBPASSWORD}"
