apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-sync
  namespace: network
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nebula-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebula-sync
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nebula-sync
          image: ghcr.io/lovelaze/nebula-sync:v0.11.2
          env:
            - name: PIHOLE_PASS
              valueFrom:
                secretKeyRef:
                  name: pihole-admin
                  key: password
            - name: PRIMARY
              value: "http://pihole-0.pihole-headless.network.svc.cluster.local|$(PIHOLE_PASS)"
            - name: REPLICAS
              value: "http://pihole-1.pihole-headless.network.svc.cluster.local|$(PIHOLE_PASS)"
            - name: FULL_SYNC
              value: "true"
            - name: RUN_GRAVITY
              value: "true"
            - name: CRON
              value: "*/15 * * * *"
            - name: TZ
              value: "${TZ}"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
