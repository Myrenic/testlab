apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: pihole
  values:
    controllers:
      pihole:
        type: daemonset
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: pihole/pihole
              tag: "2026.04.0"
            env:
              TZ: "${TZ}"
              FTLCONF_webserver_api_password: "${PIHOLE_WEBPASSWORD}"
              # Upstream DNS resolvers (user can add DoH/DoT via the web UI after deployment).
              FTLCONF_dns_upstreams: "1.1.1.1;9.9.9.9"
              # Forward .lan domain and set up reverse DNS for the LAN range via the router.
              FTLCONF_dns_revServers: "true,10.0.69.0/24,10.0.69.1,lan"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_BIND_SERVICE
                  - SYS_NICE
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pihole
    service:
      dns-cluster:
        controller: pihole
        type: ClusterIP
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
            targetPort: 53
          dns-udp:
            port: 53
            protocol: UDP
            targetPort: 53
      dns-lan:
        controller: pihole
        type: LoadBalancer
        annotations:
          # Reserved MetalLB VIP used by UniFi and LAN clients as the shared DNS entrypoint.
          metallb.io/loadBalancerIPs: 10.0.69.99
        externalTrafficPolicy: Local
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
            targetPort: 53
          dns-udp:
            port: 53
            protocol: UDP
            targetPort: 53
      web:
        controller: pihole
        type: ClusterIP
        # Session affinity keeps admin UI sessions on the same pod so login cookies work.
        sessionAffinity: ClientIP
        ports:
          http:
            port: 80
            targetPort: 80
    persistence:
      pihole-data:
        type: hostPath
        hostPathType: DirectoryOrCreate
        # Persists gravity DB, settings, and query logs across pod restarts on each node.
        path: /var/lib/pihole
        advancedMounts:
          pihole:
            app:
              - path: /etc/pihole
      custom-dns:
        type: configMap
        name: pihole-custom-dns
        advancedMounts:
          pihole:
            app:
              - path: /etc/dnsmasq.d/custom.conf
                subPath: custom.conf
                readOnly: true
