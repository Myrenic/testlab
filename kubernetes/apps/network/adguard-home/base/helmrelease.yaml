apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: adguard-home
  values:
    controllers:
      adguard-home:
        type: daemonset
        strategy: RollingUpdate
        initContainers:
          copy-config:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - cp /configmap/AdGuardHome.yaml /conf/AdGuardHome.yaml
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: adguard/adguardhome
              tag: v0.107.73
            args:
              - --config
              - /opt/adguardhome/conf/AdGuardHome.yaml
              - --work-dir
              - /opt/adguardhome/work
              - --no-check-update
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_BIND_SERVICE
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: adguard-home
    service:
      dns-cluster:
        controller: adguard-home
        type: ClusterIP
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
            targetPort: 53
          dns-udp:
            port: 53
            protocol: UDP
            targetPort: 53
      dns-lan:
        controller: adguard-home
        type: LoadBalancer
        annotations:
          # Reserved MetalLB VIP used by UniFi and LAN clients as the shared DNS entrypoint.
          metallb.io/loadBalancerIPs: 10.0.69.99
        externalTrafficPolicy: Local
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
            targetPort: 53
          dns-udp:
            port: 53
            protocol: UDP
            targetPort: 53
      web:
        controller: adguard-home
        type: ClusterIP
        ports:
          http:
            port: 3000
            targetPort: 3000
    persistence:
      config:
        type: configMap
        name: adguard-home-config
        advancedMounts:
          adguard-home:
            copy-config:
              - path: /configmap/AdGuardHome.yaml
                subPath: AdGuardHome.yaml
                readOnly: true
      conf-dir:
        type: emptyDir
        advancedMounts:
          adguard-home:
            copy-config:
              - path: /conf
            app:
              - path: /opt/adguardhome/conf
      work:
        type: emptyDir
        advancedMounts:
          adguard-home:
            app:
              - path: /opt/adguardhome/work
