apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: adguard-home-coredns
  namespace: flux-system
spec:
  targetNamespace: kube-system
  interval: 1h
  dependsOn:
    - name: adguard-home
      namespace: flux-system
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  path: ./kubernetes/apps/network/adguard-home/coredns
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
