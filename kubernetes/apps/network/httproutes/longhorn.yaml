apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: network
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https-0
  hostnames:
    - "longhorn.${SECRET_DOMAIN_0}"
  rules:
    - backendRefs:
        - name: longhorn-frontend
          namespace: storage
          port: 80
