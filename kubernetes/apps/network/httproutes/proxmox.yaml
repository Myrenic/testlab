---
apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: network
spec:
  ports:
    - name: http
      port: 8006
      protocol: TCP
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox
  namespace: network
subsets:
  - addresses:
      - ip: 10.0.3.10
    ports:
      - name: http
        port: 8006
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxmox
  namespace: network
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https-0
  hostnames:
    - "proxmox.${SECRET_DOMAIN_0}"
  rules:
    - backendRefs:
        - name: proxmox
          namespace: network
          port: 8006
