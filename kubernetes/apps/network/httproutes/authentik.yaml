apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: network
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https-0
  hostnames:
    - "auth.${SECRET_DOMAIN_0}"
  rules:
    - backendRefs:
        - name: authentik-server
          namespace: auth
          port: 80
