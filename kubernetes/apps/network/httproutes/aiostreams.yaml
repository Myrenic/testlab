apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aiostreams
  namespace: services
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https-0
  hostnames:
    - "aiostreams.${SECRET_DOMAIN_0}"
  rules:
    - backendRefs:
        - name: aiostreams
          namespace: services
          port: 3000