---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: network
spec:
  ports:
    - name: http
      port: 8123
      protocol: TCP
      targetPort: 8123
---
apiVersion: v1
kind: Endpoints
metadata:
  name: homeassistant
  namespace: network
subsets:
  - addresses:
      - ip: 10.0.100.11
    ports:
      - name: http
        port: 8123
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homeassistant
  namespace: network
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https-0
  hostnames:
    - "home.${SECRET_DOMAIN_0}"
  rules:
    - backendRefs:
        - name: homeassistant
          namespace: network
          port: 8123
