apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https-0
  hostnames:
    - "flux.${SECRET_DOMAIN_0}"
  rules:
    - backendRefs:
        - name: flux-operator
          namespace: flux-system
          port: 9080
