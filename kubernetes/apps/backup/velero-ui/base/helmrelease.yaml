apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero-ui
spec:
  interval: 1h
  chart:
    spec:
      chart: velero-ui
      version: 0.14.0
      sourceRef:
        kind: HelmRepository
        name: otwld
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Chart 0.14.0 creates the passphrase secret and policy ConfigMap but does not
    # wire them into the Deployment; inject them explicitly here.
    configuration:
      general:
        veleroNamespace: velero
        secretPassPhrase:
          useSecret: true
          existingSecret: velero-ui-passphrase
      policies:
        enabled: true

    env:
      - name: AUTH_SECRET_PASSPHRASE
        valueFrom:
          secretKeyRef:
            name: velero-ui-passphrase
            key: pass_phrase
      - name: BASIC_AUTH_ENABLED
        value: "false"

    serviceAccount:
      create: true
      automount: true

    rbac:
      create: true
      clusterAdministrator: true

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

    service:
      type: ClusterIP
      port: 3000
