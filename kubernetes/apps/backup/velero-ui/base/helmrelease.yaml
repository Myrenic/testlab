apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero-ui
spec:
  interval: 1h
  chart:
    spec:
      chart: velero-ui
      version: 0.14.0
      sourceRef:
        kind: HelmRepository
        name: otwld
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    configuration:
      general:
        veleroNamespace: velero
        secretPassPhrase:
          useSecret: true
          value: "velero-ui-testlab-jwt-passphrase"

    env:
      - name: BASIC_AUTH_ENABLED
        value: "false"

    serviceAccount:
      create: true
      automount: true

    rbac:
      create: true
      clusterAdministrator: true

    service:
      type: ClusterIP
      port: 3000
