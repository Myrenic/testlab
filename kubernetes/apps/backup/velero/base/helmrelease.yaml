apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      version: 12.0.0
      sourceRef:
        kind: HelmRepository
        name: velero
      interval: 15m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    credentials:
      useSecret: true
      existingSecret: velero-credentials

    initContainers:
      - name: velero-plugin-for-microsoft-azure
        image: velero/velero-plugin-for-microsoft-azure:v1.14.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    configuration:
      backupStorageLocation:
        - name: default
          provider: azure
          bucket: velero
          default: true
          credential:
            name: velero-credentials
            key: cloud
          config:
            resourceGroup: Velero_Backups
            storageAccount: velero76b1f66a064d
      defaultBackupStorageLocation: default
      defaultBackupTTL: 720h0m0s
      defaultVolumesToFsBackup: true
      uploaderType: kopia
      backupSyncPeriod: 1h
      defaultRepoMaintainFrequency: 24h

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

    backupsEnabled: true
    snapshotsEnabled: false
    deployNodeAgent: true

    schedules:
      # Application data backup — includes PVC (filesystem backup via kopia)
      aiostreams-daily:
        schedule: "0 3 * * *"   # 03:00 every day
        template:
          ttl: 168h0m0s         # 7 days
          storageLocation: default
          includedNamespaces:
            - services
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aiostreams
      aiostreams-monthly:
        schedule: "0 3 1 * *"   # 03:00 on the 1st of every month
        template:
          ttl: 1440h0m0s        # 60 days (~2 months)
          storageLocation: default
          includedNamespaces:
            - services
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aiostreams
      # Home Assistant — config PVC + CNPG cluster resources.
      # A CHECKPOINT hook runs before the PVC snapshot for safer DB state.
      homeassistant-daily:
        schedule: "0 3 * * *"
        template:
          ttl: 168h0m0s
          storageLocation: default
          includedNamespaces:
            - services
            - cnpg-system
          orLabelSelectors:
            - matchLabels:
                app.kubernetes.io/name: homeassistant
            - matchLabels:
                cnpg.io/cluster: homeassistant
      homeassistant-monthly:
        schedule: "0 3 1 * *"
        template:
          ttl: 1440h0m0s
          storageLocation: default
          includedNamespaces:
            - services
            - cnpg-system
          orLabelSelectors:
            - matchLabels:
                app.kubernetes.io/name: homeassistant
            - matchLabels:
                cnpg.io/cluster: homeassistant
      # Database operator backup — K8s resources only, no raw PVC backup.
      # CNPG Cluster data must be backed up via Barman (configured per-Cluster).
      # Raw filesystem backup of live PostgreSQL data is unsafe and inconsistent.
      cnpg-daily:
        schedule: "0 3 * * *"
        template:
          ttl: 168h0m0s
          storageLocation: default
          includedNamespaces:
            - cnpg-system
          defaultVolumesToFsBackup: false
      cnpg-monthly:
        schedule: "0 3 1 * *"
        template:
          ttl: 1440h0m0s
          storageLocation: default
          includedNamespaces:
            - cnpg-system
          defaultVolumesToFsBackup: false