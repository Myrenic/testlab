apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-templates
data:
  sign_in.html: |
    {{define "sign_in.html"}}
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sign In</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
                background: #0f172a;
                color: #e2e8f0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .card {
                background: #1e293b;
                border-radius: 12px;
                padding: 2.5rem;
                max-width: 400px;
                width: 90%;
                text-align: center;
                box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            }
            .spinner {
                width: 40px; height: 40px;
                margin: 0 auto 1.5rem;
                border: 3px solid #334155;
                border-top-color: #3b82f6;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
            h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
            p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1.5rem; }
            a {
                color: #3b82f6;
                text-decoration: none;
                font-size: 0.875rem;
                padding: 0.5rem 1.5rem;
                border: 1px solid #3b82f6;
                border-radius: 6px;
                display: inline-block;
                transition: background 0.2s;
            }
            a:hover { background: #3b82f620; }
        </style>
        <script>
            (function() {
                var rd = encodeURIComponent(window.location.href);
                window.location.replace('https://auth.${SECRET_DOMAIN_0}/oauth2/start?rd=' + rd);
            })();
        </script>
    </head>
    <body>
        <div class="card">
            <div class="spinner"></div>
            <h1>Signing you in</h1>
            <p>Redirecting to Azure Entra ID...</p>
            <a href="https://auth.${SECRET_DOMAIN_0}/oauth2/start">Sign in manually</a>
        </div>
    </body>
    </html>
    {{end}}
