apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
data:
  traefik-forwardauth.yaml: |
    # Authentik Blueprint: Proxy Provider for Traefik ForwardAuth
    version: 1
    metadata:
      name: Traefik Forward Auth
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: traefik-forward-auth-provider
        state: present
        attrs:
          name: Traefik Forward Auth
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          external_host: !Format ["https://auth.%s", !Env SECRET_DOMAIN_0]
          mode: forward_auth_domain
          cookie_domain: !Env SECRET_DOMAIN_0
      - model: authentik_core.application
        id: traefik-forward-auth-app
        state: present
        attrs:
          name: Traefik Forward Auth
          slug: traefik-forward-auth
          provider: !KeyOf traefik-forward-auth-provider
  azure-federation.yaml: |
    # Authentik Blueprint: Azure Entra ID Federation Source
    version: 1
    metadata:
      name: Azure Entra ID Federation
    entries:
      - model: authentik_sources_oauth.oauthsource
        id: azure-entra-id
        state: present
        attrs:
          name: Azure Entra ID
          slug: azure-entra-id
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
          enrollment_flow: !Find [authentik_flows.flow, [slug, default-source-enrollment]]
          provider_type: azuread
          consumer_key: !Env AZURE_CLIENT_ID
          consumer_secret: !Env AZURE_CLIENT_SECRET
          oidc_well_known_url: !Format ["https://login.microsoftonline.com/%s/v2.0/.well-known/openid-configuration", !Env AZURE_TENANT_ID]
          oidc_jwks_url: !Format ["https://login.microsoftonline.com/%s/discovery/v2.0/keys", !Env AZURE_TENANT_ID]
