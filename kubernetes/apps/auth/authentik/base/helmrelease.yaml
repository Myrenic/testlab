apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2026.2.1
      sourceRef:
        kind: HelmRepository
        name: authentik
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    blueprints:
      configMaps:
        - authentik-blueprints
    server:
      replicas: 1
      envFrom:
        - secretRef:
            name: authentik-secret
    worker:
      replicas: 1
      envFrom:
        - secretRef:
            name: authentik-secret
    authentik:
      error_reporting:
        enabled: false
    postgresql:
      enabled: true
      primary:
        persistence:
          enabled: true
          size: 2Gi
    redis:
      enabled: true
      master:
        persistence:
          enabled: true
          size: 1Gi
