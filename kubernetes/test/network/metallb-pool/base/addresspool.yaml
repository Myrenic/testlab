---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: pool
  namespace: network
spec:
  addresses:
    - 172.18.255.200-172.18.255.250
  autoAssign: true
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: pool
  namespace: network
spec:
  ipAddressPools:
    - pool
