name: Infrastructure Auto-Apply

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/stacks/**'
      - 'infrastructure/modules/**'
      - 'infrastructure/infra.json'

  workflow_dispatch:
    inputs:
      stack:
        description: 'Specific stack to apply (leave empty for all changed)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      stacks: ${{ steps.changes.outputs.stacks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed stacks
        id: changes
        run: |
          if [ -n "${{ inputs.stack }}" ]; then
            echo "stacks=[\"${{ inputs.stack }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          STACKS=()

          # If modules or infra.json changed, apply all LXC stacks
          # Note: runner is excluded — it cannot redeploy itself via CI
          if echo "$CHANGED_FILES" | grep -qE '^infrastructure/(modules/|infra\.json)'; then
            STACKS=("templates" "tailscale" "atlas" "omni")
          else
            # Detect individual stack changes
            for stack in templates tailscale atlas omni; do
              if echo "$CHANGED_FILES" | grep -q "^infrastructure/stacks/$stack/"; then
                STACKS+=("$stack")
              fi
            done
          fi

          if [ ${#STACKS[@]} -eq 0 ]; then
            echo "stacks=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${STACKS[@]}" | jq -R . | jq -sc .)
            echo "stacks=$JSON" >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: detect-changes
    if: needs.detect-changes.outputs.stacks != '[]'
    runs-on: self-hosted
    strategy:
      matrix:
        stack: ${{ fromJson(needs.detect-changes.outputs.stacks) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: OpenTofu Init
        working-directory: infrastructure/stacks/${{ matrix.stack }}
        env:
          PATH: /usr/local/bin:/usr/bin:/bin
          HOME: /opt/actions-runner
          AWS_ACCESS_KEY_ID: ${{ secrets.GARAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
        run: |
          tofu init -input=false

      - name: OpenTofu Apply
        working-directory: infrastructure/stacks/${{ matrix.stack }}
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          PATH: /usr/local/bin:/usr/bin:/bin
          HOME: /opt/actions-runner
          AWS_ACCESS_KEY_ID: ${{ secrets.GARAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
        run: |
          # Write age key to temp file for sops
          KEYFILE=$(mktemp)
          echo "$SOPS_AGE_KEY" > "$KEYFILE"
          export SOPS_AGE_KEY_FILE="$KEYFILE"
          sops exec-file --filename infra.json ../../infra.json \
            "tofu apply -auto-approve -input=false -compact-warnings -var-file={}"
          rm -f "$KEYFILE"
