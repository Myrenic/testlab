apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  url: https://controlplaneio.github.io/flux-operator/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: flux-operator
      version: "0.45.1"
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
  values:
    ui:
      enabled: true
